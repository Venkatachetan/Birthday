<!-- ============================================ -->
<!-- TIPS FOR BEST RESULTS -->
<!-- ============================================ -->

<!-- 1. PHOTO SIZE AND FORMAT:
      - Use JPG or PNG format
      - Recommended size: 1000x1000 pixels for gallery
      - File size: Keep under 500KB each for fast loading
      - Aspect ratio: Square (1:1) works best

   2. VIDEO FORMAT:
      - Use MP4 format (.mp4)
      - Resolution: 720p or 1080p works well
      - Keep video length: 30 seconds - 2 minutes for best experience
      - Recommended size: 50MB - 200MB max

   3. NAMING CONVENTION:
      - Use simple names: photo1.jpg, photo2.jpg, etc.
      - Use underscores or hyphens: my_photo.jpg or my-photo.jpg
      - Avoid spaces in filenames

   4. ORGANIZATION:
      - Keep photos in the static/photos/ folder
      - Keep videos in the static/videos/ folder
      - Create subfolders if you have many files:
        static/photos/vacation/
        static/photos/together/
        static/videos/memories/

   5. MOBILE OPTIMIZATION:
      - Test on mobile devices
      - Ensure images are responsive
      - Use CSS media queries for different screen sizes
-->

<!-- Common Issues:

1. Images not showing?
   - Check file path is correct
   - Make sure images are in the static/photos/ folder
   - Verify file names match (case-sensitive)

2. Broken video links?
   - Ensure videos are MP4 format
   - Check videos are in static/videos/ folder
   - Verify the file path in the src attribute

3. Styling issues?
   - Clear browser cache (Ctrl+F5)
   - Make sure CSS file is saved
   - Check for typos in class names

4. Website not starting?
   - Run: pip install -r requirements.txt
   - Check port 5000 isn't in use
   - Try: python -m flask run

-->
